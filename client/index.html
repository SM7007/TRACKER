<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Tracker — Learning Progress</title>

  <!-- Favicon / app icons -->
  <link rel="icon" type="image/png" sizes="32x32" href="src/favicon.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="src/favicon.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="src/favicon.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="manifest" href="src/site.webmanifest" />
  <meta name="theme-color" content="#14161F" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
    rel="stylesheet" />

  <!-- Applies the saved theme before React mounts, so there's no flash
         of the wrong theme on load. Default is dark — only switches to
         light if the user previously chose it (see ThemeContext.jsx). -->
  <script>
    (function () {
      try {
        if (localStorage.getItem("tracker_theme") === "light") {
          document.documentElement.setAttribute("data-theme", "light");
        }
      } catch (e) { }
    })();
  </script>
</head>

<body class="bg-ink">
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
